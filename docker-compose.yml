# Postgres solo para el microservicio `payments` (TypeORM).
# URL por defecto: postgresql://app:app@localhost:5434/payments
services:
  postgres-payments:
    image: postgres:16-alpine
    container_name: microservices-postgres-payments
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: payments
    ports:
      - '5434:5432'
    volumes:
      - postgres_payments_data:/var/lib/postgresql/data

volumes:
  postgres_payments_data:
